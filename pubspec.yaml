name: macro_tracker
description: Tu app de macros para definición. Simple, tuya, gratis.
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Base de datos local
  sqflite: ^2.3.2
  path: ^1.9.0
  
  # Estado
  provider: ^6.1.2
  
  # Gráficas
  fl_chart: ^0.68.0
  
  # HTTP para Open Food Facts
  http: ^1.2.1
  
  # Fechas
  intl: ^0.19.0
  
  # Iconos extra
  cupertino_icons: ^1.0.6

  # Scanner móvil
  mobile_scanner: ^5.2.0

  # Shared Preferences
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true